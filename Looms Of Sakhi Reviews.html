<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Reviews - Looms of Sakhi</title>
    <!-- Supabase JS Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <style>
        :root {
            --primary-color: #4a154b;
            --secondary-color: #611f69;
            --bg-color: #f8f9fa;
            --text-color: #333;
            --border-color: #ddd;
            --success-color: #2e7d32;
            --danger-color: #c62828;
            --star-color: #ffb300;
            --star-dim: #ccc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .review-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .header h1 {
            color: var(--primary-color);
            margin: 0 0 8px 0;
            font-size: 1.8em;
        }

        .header p {
            color: #666;
            margin: 0;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 0.95em;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
        }

        .form-group textarea {
            resize: vertical;
            height: 100px;
        }

        .rating-container {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        .star {
            font-size: 2.2em;
            cursor: pointer;
            color: var(--star-dim);
            transition: color 0.15s;
            user-select: none;
        }

        .star.selected {
            color: var(--star-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--secondary-color);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-delete {
            background-color: var(--danger-color);
            margin-top: 10px;
        }

        .btn-delete:hover {
            background-color: #a71d1d;
        }

        .merchant-reply-view {
            background: #fdf7fd;
            padding: 12px;
            border-left: 3px solid var(--primary-color);
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.95em;
        }

        .notice-badge {
            background-color: #e8f5e9;
            color: var(--success-color);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.9em;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="review-card">
    <div class="header">
        <h1>Looms of Sakhi</h1>
        <p id="headerSubtitle">Share your shopping experience with us!</p>
    </div>

    <!-- 1. WRITE NEW REVIEW SECTION (Visible by Default) -->
    <div id="writeSection">
        <form id="newReviewForm">
            <div class="form-group">
                <label for="newName">Your Name</label>
                <input type="text" id="newName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="newMobile">Mobile Number</label>
                <input type="tel" id="newMobile" placeholder="Enter your mobile number" required>
            </div>

            <div class="form-group">
                <label>Your Rating</label>
                <div class="rating-container" id="newStarContainer">
                    <span class="star write-star" data-value="1">★</span>
                    <span class="star write-star" data-value="2">★</span>
                    <span class="star write-star" data-value="3">★</span>
                    <span class="star write-star" data-value="4">★</span>
                    <span class="star write-star" data-value="5">★</span>
                </div>
                <input type="hidden" id="newRatingValue" value="0">
            </div>

            <div class="form-group">
                <label for="newText">Your Review</label>
                <textarea id="newText" placeholder="Tell us what you liked or how we can improve..." required></textarea>
            </div>

            <button type="submit" id="submitNewBtn">Submit Review</button>
        </form>
    </div>

    <!-- 2. EDIT / DELETE EXISTING REVIEW SECTION (Hidden until local storage matches) -->
    <div id="editSection" style="display: none;">
        <div class="notice-badge">You have already submitted a review. You can update or remove it below.</div>
        
        <!-- Merchant response display block -->
        <div id="replyDisplayBlock" class="merchant-reply-view" style="display: none;"></div>

        <form id="editReviewForm">
            <div class="form-group">
                <label>Your Current Rating</label>
                <div class="rating-container" id="editStarContainer">
                    <span class="star edit-star" data-value="1">★</span>
                    <span class="star edit-star" data-value="2">★</span>
                    <span class="star edit-star" data-value="3">★</span>
                    <span class="star edit-star" data-value="4">★</span>
                    <span class="star edit-star" data-value="5">★</span>
                </div>
                <input type="hidden" id="editRatingValue" value="0">
            </div>

            <div class="form-group">
                <label for="editText">Modify Your Review</label>
                <textarea id="editText" required></textarea>
            </div>

            <button type="button" id="updateReviewBtn" onclick="saveModifiedReviewData()">Save Changes</button>
            <button type="button" class="btn-delete" id="deleteReviewBtn" onclick="removeReviewPermanently()">Delete My Review</button>
        </form>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://bzlggezsxvjvyllsxcjk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6bGdnZXpzeHZqdnlsbHN4Y2prIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1ODExOTUsImV4cCI6MjA5NjE1NzE5NX0.74q3ToLtzAu-ttAvaAlf4eFbA_smlZ3xDKuwNEeSZIE";
    
    let supabaseClient;

    function initSupabase() {
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            setupStarsInteractiveLogic();
            checkForExistingSavedReview();
        } catch (err) {
            console.error("Database initialization failed:", err);
        }
    }

    // Set up interactive click mappings for star rows
    function setupStarsInteractiveLogic() {
        const writeStars = document.querySelectorAll('.write-star');
        writeStars.forEach(star => {
            star.addEventListener('click', () => {
                const val = parseInt(star.getAttribute('data-value'), 10);
                document.getElementById('newRatingValue').value = val;
                renderStarsArrayDisplay(writeStars, val);
            });
        });

        const editStars = document.querySelectorAll('.edit-star');
        editStars.forEach(star => {
            star.addEventListener('click', () => {
                const val = parseInt(star.getAttribute('data-value'), 10);
                document.getElementById('editRatingValue').value = val;
                renderStarsArrayDisplay(editStars, val);
            });
        });
    }

    function renderStarsArrayDisplay(elementsList, ratingValue) {
        elementsList.forEach(star => {
            const starVal = parseInt(star.getAttribute('data-value'), 10);
            star.classList.toggle('selected', starVal <= ratingValue);
        });
    }

    // Automatic Check Engine: Checks browser local storage for any previously saved review identity configurations
    async function checkForExistingSavedReview() {
        const savedReviewId = localStorage.getItem('looms_submitted_review_id');
        
        if (savedReviewId) {
            // Verify and pull latest state directly from database to keep view updated
            const { data, error } = await supabaseClient
                .from('looms_reviews')
                .select('*')
                .eq('id', savedReviewId)
                .maybeSingle();

            if (!error && data) {
                // Load existing data details into fields
                document.getElementById('editText').value = data.review_text;
                document.getElementById('editRatingValue').value = data.rating;
                renderStarsArrayDisplay(document.querySelectorAll('.edit-star'), data.rating);

                // Check for owner comments updates
                const replyBlock = document.getElementById('replyDisplayBlock');
                if (data.merchant_reply) {
                    replyBlock.style.display = 'block';
                    replyBlock.innerHTML = `<strong>Looms of Sakhi Response:</strong><br>${data.merchant_reply}`;
                } else {
                    replyBlock.style.display = 'none';
                }

                // Switch visible application frame panels immediately
                document.getElementById('headerSubtitle').innerText = "Manage or alter your submitted feedback record.";
                document.getElementById('writeSection').style.display = 'none';
                document.getElementById('editSection').style.display = 'block';
                return;
            }
        }
        
        // Show clean default review layout state if no storage data matching entry found
        showDefaultWriteLayout();
    }

    function showDefaultWriteLayout() {
        document.getElementById('headerSubtitle').innerText = "Share your shopping experience with us!";
        document.getElementById('editSection').style.display = 'none';
        document.getElementById('writeSection').style.display = 'block';
    }

    // SUBMIT NEW entry to pipeline
    document.getElementById('newReviewForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const rating = parseInt(document.getElementById('newRatingValue').value, 10);
        if (rating === 0) {
            alert("Please select a rating level using the stars before submitting.");
            return;
        }

        const btn = document.getElementById('submitNewBtn');
        btn.disabled = true;
        btn.innerText = "Submitting...";

        const payload = {
            customer_name: document.getElementById('newName').value.trim(),
            mobile_number: document.getElementById('newMobile').value.trim(),
            rating: rating,
            review_text: document.getElementById('newText').value.trim()
        };

        const { data, error } = await supabaseClient
            .from('looms_reviews')
            .insert([payload])
            .select('id')
            .maybeSingle();

        btn.disabled = false;
        btn.innerText = "Submit Review";

        if (error) {
            alert("Submission error: " + error.message);
        } else {
            alert("Thank you! Your review has been saved.");
            
            // Save identifying configuration info to local memory pipeline
            if (data && data.id) {
                localStorage.setItem('looms_submitted_review_id', data.id);
            }
            
            document.getElementById('newReviewForm').reset();
            renderStarsArrayDisplay(document.querySelectorAll('.write-star'), 0);
            document.getElementById('newRatingValue').value = "0";
            
            // Re-run system scanner to swap interface panels instantly
            checkForExistingSavedReview();
        }
    });

    // UPDATE live entry values in pipeline
    async function saveModifiedReviewData() {
        const savedReviewId = localStorage.getItem('looms_submitted_review_id');
        const rating = parseInt(document.getElementById('editRatingValue').value, 10);
        const text = document.getElementById('editText').value.trim();

        if (!text) {
            alert("Review comment text description cannot be blank.");
            return;
        }

        const btn = document.getElementById('updateReviewBtn');
        btn.disabled = true;
        btn.innerText = "Saving Changes...";

        const { error } = await supabaseClient
            .from('looms_reviews')
            .update({ rating: rating, review_text: text })
            .eq('id', savedReviewId);

        btn.disabled = false;
        btn.innerText = "Save Changes";

        if (error) {
            alert("Could not update review details: " + error.message);
        } else {
            alert("Success! Your modifications have been saved.");
            checkForExistingSavedReview();
        }
    }

    // DELETE entry rows completely from database
    async function removeReviewPermanently() {
        if (!confirm("Are you completely sure you want to delete your review permanently from our system?")) {
            return;
        }

        const savedReviewId = localStorage.getItem('looms_submitted_review_id');
        const btn = document.getElementById('deleteReviewBtn');
        btn.disabled = true;
        btn.innerText = "Deleting...";

        const { error } = await supabaseClient
            .from('looms_reviews')
            .delete()
            .eq('id', savedReviewId);

        if (error) {
            alert("Could not remove review entry record: " + error.message);
            btn.disabled = false;
            btn.innerText = "Delete My Review";
        } else {
            alert("Your review has been successfully deleted.");
            
            // Wipe browser trace identity tags completely clean
            localStorage.removeItem('looms_submitted_review_id');
            
            // Reset layouts back to fresh clean submission forms panels
            showDefaultWriteLayout();
        }
    }

    window.addEventListener('DOMContentLoaded', initSupabase);
</script>

</body>
</html>
